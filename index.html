<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task List</title>
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #4a6fa5;
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    #taskInput {
      width: 70%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border 0.3s;
    }

    #taskInput:focus {
      border-color: #4a6fa5;
      outline: none;
    }

    #addBtn {
      padding: 12px 20px;
      background: #4a6fa5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }

    #addBtn:hover {
      background: #3a5a80;
    }

    #taskList li {
      background: #f8f9fa;
      padding: 12px;
      margin: 8px 0;
      border-left: 4px solid #4a6fa5;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s;
      animation: taskAppear 0.5s ease-in-out;
    }

    #taskList li:hover {
      transform: translateX(5px);
    }

    /* Анимация появления задачи */
    @keyframes taskAppear {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Анимация завершения задачи */
    .task-complete {
      animation: taskComplete 0.5s ease-in-out forwards;
    }

    @keyframes taskComplete {
      0% {
        opacity: 1;
        transform: rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: rotate(5deg);
      }
    }

    .rpg-stats {
      margin-top: 30px;
      background: #4a6fa5;
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    #xpBar {
      width: 100%;
      height: 10px;
      margin: 10px 0;
      border-radius: 5px;
      animation: xpFill 1s ease-in-out;
      position: relative;
    }

    #xpBar::-webkit-progress-bar {
      background: #e0e0e0;
      border-radius: 5px;
    }

    #xpBar::-webkit-progress-value {
      background: #ffd700;
      border-radius: 5px;
      position: relative;
      overflow: hidden;
    }

    /* Эффект сияния для прогресс-бара */
    @keyframes xpFill {
      0% {
        box-shadow: 0 0 0 rgba(255, 215, 0, 0);
      }
      50% {
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
      }
      100% {
        box-shadow: 0 0 0 rgba(255, 215, 0, 0);
      }
    }

    /* Анимация достижения */
    #achievementText {
      display: inline-block;
    }

    .achievement-unlock {
      animation: achievementUnlock 0.7s ease-in-out;
    }

    @keyframes achievementUnlock {
      0% {
        transform: scale(1);
        color: white;
      }
      50% {
        transform: scale(1.2);
        color: #ffd700;
      }
      100% {
        transform: scale(1);
        color: white;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>RPG Планировщик</h1>
    <input type="text" id="taskInput" placeholder="Добавь задачу...">
    <button id="addBtn">+ Добавить</button>
    <ul id="taskList"></ul>
    <div class="rpg-stats">
      <h2>Уровень: <span id="level">1</span></h2>
      <progress id="xpBar" max="100" value="0"></progress>
      <p id="achievementText">Достижения: Пока пусто!</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
